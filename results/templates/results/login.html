{% extends 'base.html' %}
{% block title %}Admin Login | SRMS{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5">
        <div class="card shadow-lg border-0">
            <div class="card-header bg-primary text-white text-center py-4 rounded-top">
                <h3 class="mb-0"><i class="fa-solid fa-user-shield me-2"></i> Admin Login</h3>
                <p class="text-white-50 mb-0 mt-2">Sign in to manage student results</p>
            </div>
            <div class="card-body p-4 p-md-5">
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-4 position-relative">
                        <label for="username" class="form-label">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-user text-muted"></i></span>
                            <input type="text" class="form-control border-start-0 ps-0" id="username" name="username" placeholder="Enter username" required autofocus>
                        </div>
                    </div>
                    
                    <div class="mb-4 position-relative">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
                            <input type="password" class="form-control border-start-0 ps-0" id="password" name="password" placeholder="Enter password" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 py-2 fs-5 fw-bold mt-2">
                        <i class="fa-solid fa-sign-in-alt me-2"></i> Login
                    </button>
                    
                    <div class="text-center mt-4">
                        <a href="{% url 'view_result' %}" class="text-decoration-none text-muted transition-hover">
                            <i class="fa-solid fa-search me-1"></i> Public Result Search
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
